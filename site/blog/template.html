<section class="container">
    <h1>{{ title }}</h1>
    <p>
        {{ #each tags }}
        <code>#{{ . }}</code>
        {{ /each tags }}
    </p>
    <section>
        {{ #if prev_href }}
        <a href="{{ prev_href }}">← {{ prev_title }}</a>
        {{ /if prev_href }}
        <span style="margin: 0 10px;"> | </span>
        {{ #if next_href }}
        <a href="{{ next_href }}">{{ next_title }} →</a>
        {{ /if next_href }}
    </section>
    <section>
        <em>Published: {{ publish_date }}</em>
    </section>
    <hr>
    {{ content }}
</section>
