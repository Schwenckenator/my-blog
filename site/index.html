<section class="container">
    {{ #each blog }}
    <article>
        <hgroup>
            <div class="grid">
                <h4>
                    <a class="contrast" href="/blog/{{ slug }}">
                        {{ title }}
                    </a>
                </h4>
                <p class="to-end">{{ publish_date }}</p>
            </div>
            <p>
                <small>
                    {{ description }}
                </small>
            </p>
        </hgroup>
        {{ #if tags }}
        <footer>
            {{ #each tags }}
            <code>#{{ . }}</code>
            {{ /each tags }}
        </footer>
        {{ /if tags }}
    </article>
    {{ /each blog }}
</section>
